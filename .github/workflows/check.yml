name: Check Germany Visa Appointment

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Ensure state file exists
        run: |
          if [ ! -f state.json ]; then
            echo '{"lastStatus":"unknown","lastFingerprint":""}' > state.json
          fi

      - name: Run bot
        env:
          APPOINTMENT_URL: ${{ secrets.APPOINTMENT_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CHECK_TIMEOUT_MS: "45000"
          HEADLESS: "true"
          TIMEZONE: "Europe/Dublin"
          NEGATIVE_PATTERNS: ${{ secrets.NEGATIVE_PATTERNS }}
          POSITIVE_PATTERNS: ${{ secrets.POSITIVE_PATTERNS }}
        run: node bot.js

      - name: Commit updated state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Update bot state"
          git push